<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>秒镜AI - AI视频导演工作台</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1117;
      color: #f5f7fb;
      line-height: 1.6;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero {
      padding: 28px 0 18px;
    }

    .brand {
      font-size: 15px;
      color: #8ea4ff;
      font-weight: 700;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 14px 0 0;
      color: #b8c0d9;
      font-size: 16px;
    }

    .panel {
      background: #171b25;
      border: 1px solid #2a3142;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #d9def0;
      font-weight: 700;
      margin-bottom: 8px;
    }

    textarea,
    select,
    input {
      width: 100%;
      border: 1px solid #384156;
      background: #0f131d;
      color: #ffffff;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    textarea:focus,
    select:focus,
    input:focus {
      border-color: #6d83ff;
      box-shadow: 0 0 0 3px rgba(109, 131, 255, 0.18);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    .examples {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 2px;
      margin-top: 10px;
    }

    .chip {
      white-space: nowrap;
      border: 1px solid #384156;
      background: #101521;
      color: #dce3ff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .chip:active {
      transform: scale(0.98);
    }

    .primary-btn {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 15px 16px;
      margin-top: 18px;
      background: linear-gradient(135deg, #6d83ff, #19c7a8);
      color: #ffffff;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-btn:active {
      transform: translateY(1px);
    }

    .result-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .result-title h2 {
      margin: 0;
      font-size: 20px;
    }

    .copy-all {
      border: 1px solid #384156;
      background: #101521;
      color: #dce3ff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .result-block {
      background: #101521;
      border: 1px solid #283147;
      border-radius: 8px;
      padding: 14px;
      margin-top: 12px;
    }

    .block-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .block-head h3 {
      margin: 0;
      font-size: 16px;
      color: #ffffff;
    }

    .copy-btn {
      border: 1px solid #384156;
      background: #171b25;
      color: #dce3ff;
      border-radius: 8px;
      padding: 6px 9px;
      font-size: 12px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .content {
      white-space: pre-wrap;
      color: #cfd7ef;
      font-size: 14px;
    }

    .empty {
      color: #8d98b8;
      font-size: 14px;
      padding: 14px 0 2px;
    }

    .note {
      color: #8d98b8;
      font-size: 13px;
      text-align: center;
      margin-top: 18px;
    }

    @media (min-width: 680px) {
      .page {
        padding-top: 32px;
      }

      h1 {
        font-size: 42px;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="brand">秒镜AI</div>
      <h1>AI视频导演工作台</h1>
      <p class="subtitle">输入一句想法，自动生成首帧图、视频提示词、分镜脚本、表演提示词和发布文案。</p>
    </section>

    <section class="panel">
      <label for="idea">你的视频创意</label>
      <textarea id="idea" placeholder="例如：雨夜里，长大的女儿终于理解了沉默的父亲"></textarea>

      <div class="examples">
        <button class="chip" onclick="setExample('雨夜里，长大的女儿终于理解了沉默的父亲')">雨夜父女和解</button>
        <button class="chip" onclick="setExample('一只流浪狗守着主人留下的旧围巾，直到冬天过去')">流浪狗守护围巾</button>
        <button class="chip" onclick="setExample('老人每天去车站等一个不会再回来的人')">老人车站等人</button>
        <button class="chip" onclick="setExample('女孩收到十年前没有送出的道歉信')">迟来的道歉信</button>
        <button class="chip" onclick="setExample('母亲深夜听到孩子很久以前发来的语音留言')">母亲深夜语音</button>
      </div>

      <div class="grid">
        <div>
          <label for="duration">视频时长</label>
          <select id="duration">
            <option>10秒</option>
            <option>15秒</option>
            <option>30秒</option>
            <option>60秒</option>
          </select>
        </div>

        <div>
          <label for="ratio">画面比例</label>
          <select id="ratio">
            <option>9:16 竖屏</option>
            <option>16:9 横屏</option>
            <option>1:1 方屏</option>
          </select>
        </div>

        <div>
          <label for="style">视频风格</label>
          <select id="style">
            <option>电影级写实</option>
            <option>治愈短片</option>
            <option>高级广告片</option>
            <option>纪录片质感</option>
            <option>国风美学</option>
          </select>
        </div>

        <div>
          <label for="mood">情绪类型</label>
          <select id="mood">
            <option>感人</option>
            <option>遗憾</option>
            <option>温暖</option>
            <option>震撼</option>
            <option>悬疑</option>
          </select>
        </div>

        <div>
          <label for="platform">目标平台</label>
          <select id="platform">
            <option>抖音</option>
            <option>小红书</option>
            <option>视频号</option>
            <option>B站</option>
            <option>快手</option>
          </select>
        </div>

        <div>
          <label for="role">主角类型</label>
          <select id="role">
            <option>普通人</option>
            <option>父亲</option>
            <option>母亲</option>
            <option>女孩</option>
            <option>老人</option>
            <option>宠物</option>
          </select>
        </div>
      </div>

      <button class="primary-btn" onclick="generatePrompt()">一键生成电影级提示词</button>
    </section>

    <section class="panel" id="resultPanel">
      <div class="result-title">
        <h2>生成结果</h2>
        <button class="copy-all" onclick="copyAll()">复制完整方案</button>
      </div>

      <div id="empty" class="empty">生成后，完整 AI 视频方案会显示在这里。</div>
      <div id="results"></div>
    </section>

    <p class="note">秒镜AI 当前为免费模板版，适合快速生成 AI 视频创作方案。</p>
  </main>

    function setExample(text) {
      document
